name: Publicar site e atualizar dados

# Três responsabilidades SEPARADAS:
#  1) "testes": unit + VALIDAÇÃO DOS DADOS (invariantes de docs/data) a cada push.
#     O deploy só acontece se passarem — assim uma regressão de dado (ex.: o bug
#     dos pisos, em que 14% virou "0,1%") não chega à produção.
#  2) "atualizar-dados": baixa TSE/IBGE, recalcula e commita os JSONs de volta.
#     Roda só no agendamento mensal (ou manual) e TOLERA falha de rede — se as
#     fontes estiverem fora do ar, o site segue publicado com o último dado bom.
#     (Valida os dados recém-gerados ANTES de commitar.)
#  3) "deploy": publica o site estático (docs/) no GitHub Pages, desde que os
#     testes passem. Não depende da atualização de dados (que pode falhar por rede).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "0 6 5 * *"     # todo dia 5, 06:00 UTC

permissions:
  contents: write           # para commitar os dados regenerados
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 0) Testes (sempre): unit + validação dos invariantes de docs/data. Bloqueia o
  #    deploy se falhar — rede de segurança contra regressões de dado.
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Testes (unit + validação dos dados)
        run: PYTHONPATH=src python -m unittest discover -s tests -v

  # 1) Atualiza os dados (baixa, recalcula, commita). Só no agendamento/manual.
  #    continue-on-error nas etapas de rede: instabilidade do TSE não derruba o deploy.
  atualizar-dados:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar pipeline (Brasil)
        id: pipeline
        continue-on-error: true
        run: PYTHONPATH=src python -m eleitoral.build

      - name: Rodar testes
        if: steps.pipeline.outcome == 'success'
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Commitar dados regenerados
        if: steps.pipeline.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data manifest/provenance.json data/raw/crosswalk data/raw/ibge
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore(dados): atualização automática do pipeline"
            git push
          fi

      - name: Aviso se o pipeline falhou
        if: steps.pipeline.outcome != 'success'
        run: echo "::warning::Atualização de dados falhou (provável instabilidade de rede TSE/IBGE). O site segue publicado com os dados versionados."

  # 2) Publica docs/ no Pages, DESDE QUE os testes passem. Não exige sucesso da
  #    atualização de dados (que pode ser pulada num push ou falhar por rede).
  deploy:
    needs: [testes, atualizar-dados]
    if: always() && needs.testes.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # pega o estado mais recente (inclui dados recém-commitados)

      - name: Preparar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
