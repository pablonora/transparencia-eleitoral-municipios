name: Atualizar emendas (semanal)

# Atualização LEVE e independente do build completo: refaz só as emendas
# parlamentares federais (TransfereGov + listas da Câmara e do Senado — todas APIs
# públicas, SEM chave) e injeta no docs/data/brasil.json + meta.json, sem
# reprocessar TSE/IBGE. O build mensal (atualizar-dados.yml) cuida do resto.
# Tolera falha de rede (snapshot anterior é mantido) e valida antes de commitar.
# Publica o site em seguida, pois um push via GITHUB_TOKEN não dispara outro workflow.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"     # toda segunda-feira, 07:00 UTC

permissions:
  contents: write           # commitar o JSON atualizado
  pages: write
  id-token: write

concurrency:
  group: pages              # mesmo grupo do build mensal: evita deploy concorrente
  cancel-in-progress: false

jobs:
  emendas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Atualizar emendas (TransfereGov + Câmara/Senado)
        id: emendas
        continue-on-error: true     # instabilidade de rede não derruba o site
        run: PYTHONPATH=src python -m eleitoral.emendas

      - name: Testes (unit + validação dos dados)
        if: steps.emendas.outcome == 'success'
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Commitar emendas atualizadas
        if: steps.emendas.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # só o emendas.json (leve) e o meta.json (carimbo de versão) — o brasil.json
          # grande NÃO é tocado no refresh semanal, então não re-baixa à toa.
          git add docs/data/emendas.json docs/data/meta.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nas emendas."
          else
            git commit -m "chore(emendas): atualização semanal (TransfereGov)"
            git push
          fi

      - name: Aviso se falhou
        if: steps.emendas.outcome != 'success'
        run: echo "::warning::Atualização de emendas falhou (provável instabilidade de rede). Snapshot anterior mantido."

  # Publica docs/ no Pages com o JSON recém-atualizado. Independe do sucesso da
  # etapa de rede: se as emendas não atualizarem, republica o estado atual.
  deploy:
    needs: emendas
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # estado mais recente (inclui o commit das emendas)
      - name: Preparar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
